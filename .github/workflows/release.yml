name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  PROVIDER: pulumi-resource-oneuptime

jobs:
  # ── Build provider binaries and create GitHub release artifacts ──
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload provider binaries
        uses: actions/upload-artifact@v4
        with:
          name: provider-binaries
          path: dist/*.tar.gz

  # ── Publish Node.js SDK to npm (trusted publishing) ──
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: latest

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build provider
        run: make provider VERSION=${{ env.VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Generate Node.js SDK
        run: pulumi package gen-sdk ./bin/${{ env.PROVIDER }} --language nodejs --out sdk/nodejs

      - name: Add README to Node.js SDK
        run: cp README.md sdk/nodejs/nodejs/README.md

      - name: Set npm package version and scope
        working-directory: sdk/nodejs/nodejs
        run: |
          jq '.name = "@ottercoders/pulumi-oneuptime" | .version = "${{ env.VERSION }}"' package.json > tmp.json && mv tmp.json package.json

      - name: Build Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: |
          npm install
          npm run build

      - name: Pack Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: npm pack

      - name: Publish Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: sdk/nodejs/nodejs/*.tgz

  # ── Publish Python SDK to PyPI (trusted publishing) ──
  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: latest

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build provider
        run: make provider VERSION=${{ env.VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Python SDK
        run: pulumi package gen-sdk ./bin/${{ env.PROVIDER }} --language python --out sdk/python

      - name: Add README to Python SDK
        run: cp README.md sdk/python/python/README.md

      - name: Set Python package version
        working-directory: sdk/python/python
        run: sed -i 's/^  version = .*/  version = "${{ env.VERSION }}"/' pyproject.toml

      - name: Build Python SDK
        working-directory: sdk/python/python
        run: |
          pip install build
          python -m build

      - name: Publish Python SDK
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/python/dist/

      - name: Upload PyPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-package
          path: sdk/python/python/dist/*

  # ── Attach all SDK artifacts to GitHub Release ──
  attach-artifacts:
    name: Attach Artifacts to Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-pypi]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: latest

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build provider and generate schema
        run: |
          make provider VERSION=${{ env.VERSION }}
          make schema

      - name: Download npm artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: artifacts/npm

      - name: Download PyPI artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-package
          path: artifacts/pypi

      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            artifacts/npm/*.tgz \
            artifacts/pypi/*.tar.gz \
            artifacts/pypi/*.whl \
            schema.json \
            --clobber
