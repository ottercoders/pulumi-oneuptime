name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  PROVIDER: pulumi-resource-oneuptime

jobs:
  # ── Build provider binaries and create GitHub release artifacts ──
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload provider binaries
        uses: actions/upload-artifact@v4
        with:
          name: provider-binaries
          path: dist/*.tar.gz

  # ── Generate SDKs, publish packages, attach to release ──
  publish-sdks:
    name: Publish SDKs
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          pulumi-version: latest

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build provider
        run: make provider VERSION=${{ env.VERSION }}

      - name: Generate schema
        run: make schema

      # ── Node.js SDK ──

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Generate Node.js SDK
        run: pulumi package gen-sdk ./bin/${{ env.PROVIDER }} --language nodejs --out sdk/nodejs

      - name: Set npm package version and scope
        working-directory: sdk/nodejs/nodejs
        run: |
          jq '.name = "@ottercoders/pulumi-oneuptime" | .version = "${{ env.VERSION }}"' package.json > tmp.json && mv tmp.json package.json

      - name: Build Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: |
          npm install
          npm run build

      - name: Pack Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: npm pack

      - name: Publish Node.js SDK
        working-directory: sdk/nodejs/nodejs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Python SDK ──

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Python SDK
        run: pulumi package gen-sdk ./bin/${{ env.PROVIDER }} --language python --out sdk/python

      - name: Set Python package version
        working-directory: sdk/python/python
        run: sed -i 's/^  version = .*/  version = "${{ env.VERSION }}"/' pyproject.toml

      - name: Build Python SDK
        working-directory: sdk/python/python
        run: |
          pip install build
          python -m build

      - name: Publish Python SDK
        working-directory: sdk/python/python
        run: |
          pip install twine
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      # ── Attach SDK artifacts to GitHub Release ──

      - name: Attach SDK artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} \
            sdk/nodejs/nodejs/*.tgz \
            sdk/python/python/dist/*.tar.gz \
            sdk/python/python/dist/*.whl \
            schema.json \
            --clobber
